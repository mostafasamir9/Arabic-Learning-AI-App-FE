<div class="container mt-4">
  <div *ngIf="post" class="card post-card">
    <div class="card-header">
      <h3 class="card-title mb-0">{{ post.title }}</h3>
      <small class="text-muted" *ngIf="post.level || post.topic">
        {{ post.level }} <span *ngIf="post.level && post.topic">|</span> {{ post.topic }}
      </small>
    </div>
    <img *ngIf="post.headerPhotoBase64" [src]="getSafeImageUrl(post.headerPhotoBase64)" class="card-img-top post-image" alt="Header Photo">

    <div *ngIf="post.voiceFileBase64" class="voice-clip-container">
      <audio controls class="voice-clip">
        <source [src]="getSafeAudioUrl(post.voiceFileBase64)" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

    <div class="card-body">
      <p class="card-text arabic-text">
        <span *ngIf="showTashkeel && post.textWithTashkeel; else originalArabic">{{ post.textWithTashkeel }}</span>
        <ng-template #originalArabic>{{ post.textArabic }}</ng-template>
      </p>

      <div *ngIf="showEnglishTranslation && post.textEnglish">
        <hr>
        <p class="card-text english-text">{{ post.textEnglish }}</p>
      </div>
    </div>
    <div class="card-footer">
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="toggleEnglish" [(ngModel)]="showEnglishTranslation">
        <label class="form-check-label" for="toggleEnglish">Show English Translation</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="toggleTashkeel" [(ngModel)]="showTashkeel">
        <label class="form-check-label" for="toggleTashkeel">Show Tashkeel</label>
      </div>
    </div>
  </div>
  <div *ngIf="!post">
    <div class="alert alert-info" role="alert">
      Loading post details...
    </div>
  </div>
</div>

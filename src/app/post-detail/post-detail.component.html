<div class="container mt-4">
  <div *ngIf="post">
    <h2>Post Details</h2>
    <div class="card">
      <div class="card-body">
        <h5 class="card-title" *ngIf="post.title"><strong>Title:</strong> {{ post.title }}</h5>
        <p class="card-text" *ngIf="post.level"><strong>Level:</strong> {{ post.level }}</p>
        <p class="card-text" *ngIf="post.topic"><strong>Topic:</strong> {{ post.topic }}</p>
        <p class="card-text"><strong>Arabic Text:</strong> {{ post.textArabic }}</p>
        <p class="card-text"><strong>English Translation:</strong> {{ post.textEnglish }}</p>
        <p class="card-text"><strong>Arabic with Tashkeel:</strong> {{ post.textWithTashkeel }}</p>

        <div *ngIf="post.voiceFileBase64" class="mt-3">
          <strong>Voice:</strong>
          <audio controls class="d-block">
            <source [src]="getSafeAudioUrl(post.voiceFileBase64)" type="audio/mpeg">
            Your browser does not support the audio element.
          </audio>
        </div>

        <div *ngIf="post.headerPhotoBase64" class="mt-3">
          <strong>Image:</strong>
          <img [src]="getSafeImageUrl(post.headerPhotoBase64)" alt="Header Photo" class="img-fluid mt-2" style="max-width: 400px;">
        </div>
      </div>
    </div>
  </div>
  <div *ngIf="!post">
    <div class="alert alert-info" role="alert">
      Loading post details...
    </div>
  </div>
</div>
